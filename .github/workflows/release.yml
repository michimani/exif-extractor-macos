name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15

    steps:
      - name: Set path variables
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db" >> $GITHUB_ENV
          echo "ARCHIVE_PATH=$RUNNER_TEMP/ExifExtractor.xcarchive" >> $GITHUB_ENV
          echo "EXPORT_PATH=$RUNNER_TEMP/export" >> $GITHUB_ENV
          echo "PKG_DIR=$RUNNER_TEMP" >> $GITHUB_ENV
          echo "SPARKLE_DIR=$RUNNER_TEMP/Sparkle" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION="2.9.3"
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/Sparkle.tar.xz"
          mkdir -p "$SPARKLE_DIR"
          tar -xf "$RUNNER_TEMP/Sparkle.tar.xz" -C "$SPARKLE_DIR"

      - name: Import certificates into temporary keychain
        env:
          APP_CERT_BASE64: ${{ secrets.APPLE_CERTIFICATE }}
          APP_CERT_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          INSTALLER_CERT_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo -n "$APP_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/app_cert.p12"
          security import "$RUNNER_TEMP/app_cert.p12" \
            -P "$APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          echo -n "$INSTALLER_CERT_BASE64" | base64 --decode -o "$RUNNER_TEMP/installer_cert.p12"
          security import "$RUNNER_TEMP/installer_cert.p12" \
            -P "$INSTALLER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Build archive
        run: |
          xcodebuild archive \
            -project ExifExtractor.xcodeproj \
            -scheme ExifExtractor \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"

      - name: Export .app
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>Developer ID Application</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Notarize .app
        run: |
          ditto -c -k --keepParent \
            "$EXPORT_PATH/ExifExtractor.app" \
            "$RUNNER_TEMP/ExifExtractor-app.zip"

          xcrun notarytool submit "$RUNNER_TEMP/ExifExtractor-app.zip" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait --verbose

          xcrun stapler staple "$EXPORT_PATH/ExifExtractor.app"

      - name: Create Sparkle .zip for auto-update
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          ZIP_PATH="$RUNNER_TEMP/ExifExtractor-$VERSION.zip"
          ditto -c -k --keepParent "$EXPORT_PATH/ExifExtractor.app" "$ZIP_PATH"

          SIGN_OUTPUT=$("$SPARKLE_DIR/bin/sign_update" "$ZIP_PATH" --ed-key-file <(echo "$SPARKLE_PRIVATE_KEY"))
          ED_SIGNATURE=$(echo "$SIGN_OUTPUT" | grep -oP '(?<=sparkle:edSignature=")[^"]+')
          ZIP_SIZE=$(stat -f%z "$ZIP_PATH")
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")
          DOWNLOAD_URL="https://github.com/michimani/exif-extractor-macos/releases/download/v${VERSION}/ExifExtractor-${VERSION}.zip"

          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV
          echo "ED_SIGNATURE=$ED_SIGNATURE" >> $GITHUB_ENV
          echo "ZIP_SIZE=$ZIP_SIZE" >> $GITHUB_ENV
          echo "PUB_DATE=$PUB_DATE" >> $GITHUB_ENV
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV

      - name: Create .pkg
        run: |
          pkgbuild \
            --component "$EXPORT_PATH/ExifExtractor.app" \
            --install-location /Applications \
            --identifier com.michimani.ExifExtractor \
            --version "$VERSION" \
            "$RUNNER_TEMP/ExifExtractor.pkg"

          INSTALLER_IDENTITY=$(security find-identity -v "$KEYCHAIN_PATH" \
            | grep "Developer ID Installer" | sed 's/.*"\(.*\)".*/\1/' | head -1)

          productbuild \
            --distribution packaging/Distribution.xml \
            --package-path "$RUNNER_TEMP" \
            --sign "$INSTALLER_IDENTITY" \
            "$RUNNER_TEMP/ExifExtractor-$VERSION.pkg"

      - name: Notarize .pkg
        run: |
          xcrun notarytool submit "$RUNNER_TEMP/ExifExtractor-$VERSION.pkg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --wait --verbose

          xcrun stapler staple "$RUNNER_TEMP/ExifExtractor-$VERSION.pkg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "EXIF Extractor v${{ env.VERSION }}"
          files: |
            ${{ env.PKG_DIR }}/ExifExtractor-${{ env.VERSION }}.pkg
            ${{ env.ZIP_PATH }}
          generate_release_notes: true

      - name: Update appcast.xml
        run: python3 scripts/update_appcast.py

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for v$VERSION"
          git push origin HEAD:main

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$KEYCHAIN_PATH"
